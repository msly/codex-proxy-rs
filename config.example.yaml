# Listener address. Go-style ":8080" is supported.
listen: ":18080"

# Directory containing account JSON files.
auth-dir: "./auths"

# Upstream Codex base URL. If empty, Rust derives it from backend-domain.
base-url: "https://chatgpt.com/backend-api/codex"
backend-domain: "chatgpt.com"
# backend-resolve-address: "1.2.3.4" # or "host:port"

# Optional proxy used by upstream / quota / health / keepalive clients.
proxy-url: ""

# Logging: debug | info | warn | error
log-level: "info"

# Internal retry count. Total attempts = max-retry + 1.
max-retry: 30
empty-retry-max: 20
selector: "round-robin" # or "quota-first"

# Optional API keys. Leave empty to disable auth.
api-keys:
  - "sk-123"

# Health checker. Set interval to 0 to disable.
health-check-interval: 0
health-check-max-failures: 3
health-check-concurrency: 5
health-check-start-delay: 45
health-check-batch-size: 20
health-check-request-timeout: 8

# Refresh interval. Set to 0 to disable.
refresh-interval: 3000
refresh-concurrency: 50
refresh-single-timeout-sec: 30
refresh-batch-size: 50
save-workers: 4
# Scan new auths every 30 seconds.
auth-scan-interval: 30
# POST /check-quota
quota-check-concurrency: 50

cooldown-401-sec: 7200
cooldown-429-sec: 86400

# Network settings.
# enable-http2 controls outbound clients for Codex / wham / health / keepalive.
enable-http2: true
max-idle-conns-per-host: 60

# Other runtime settings.
startup-async-load: true
startup-load-retry-interval: 10
shutdown-timeout: 5
keepalive-interval: 60
upstream-timeout-sec: 0




