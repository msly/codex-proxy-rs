<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据统计与展示</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #141313;
      --muted: #6b625a;
      --accent: #ff6b35;
      --accent-2: #1b9aaa;
      --card: #fff7e6;
      --card-2: #fef1d1;
      --line: #e3d6bf;
      --shadow: 0 10px 30px rgba(0,0,0,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -10%, #ffe6b3, transparent 60%),
        radial-gradient(1000px 600px at 100% 0%, #c8fff4, transparent 55%),
        var(--bg);
      font-family: "Space Grotesk", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 36px auto 80px;
      padding: 0 20px;
    }
    header {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 24px;
    }
    .title {
      font-size: 32px;
      letter-spacing: 0.5px;
      margin: 0;
    }
    .subtitle {
      color: var(--muted);
      margin: 6px 0 0;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      color: var(--ink);
      background: linear-gradient(135deg, #ffd166, #ff9f1c);
      box-shadow: var(--shadow);
    }
    button.secondary {
      background: linear-gradient(135deg, #b3f2ee, #58c8c4);
    }
    button.ghost {
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .card:nth-child(2) { background: var(--card-2); }
    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 700;
    }
    .table-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .trend-wrap {
      background: #fffdf7;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: grid;
      gap: 16px;
    }
    .trend-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .trend-header h2 {
      margin: 0;
      font-size: 18px;
    }
    .segmented {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .segmented button {
      padding: 8px 14px;
      font-size: 12px;
      box-shadow: none;
      background: #fff;
      border: 1px solid var(--line);
    }
    .segmented button.active {
      background: linear-gradient(135deg, #ffd166, #ff9f1c);
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .chart-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    .chart-meta h3 {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .chart-svg {
      width: 100%;
      height: 220px;
      display: block;
      overflow: visible;
    }
    .axis-text {
      fill: var(--muted);
      font-size: 11px;
    }
    .empty-text {
      fill: var(--muted);
      font-size: 13px;
    }
    .table-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fffdf7;
      flex-wrap: wrap;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    select, input[type="text"] {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0e7d7;
      text-align: left;
      white-space: nowrap;
    }
    th {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #fffdf7;
    }
    .sort-btn {
      appearance: none;
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
      color: inherit;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .sort-indicator {
      font-size: 10px;
      color: var(--muted);
    }
    tr:hover td { background: #fff6df; }
    .status {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
    }
    .status.active { background: #dcfce7; color: #166534; }
    .status.cooldown { background: #ffe4e6; color: #9f1239; }
    .status.disabled { background: #e2e8f0; color: #475569; }
    .muted { color: var(--muted); }
    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .pagination button {
      padding: 6px 12px;
      font-size: 12px;
    }
    .footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .placeholder {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    .placeholder-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .skeleton {
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f3ead7 25%, #fff7e6 50%, #f3ead7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    .skeleton.big { height: 28px; border-radius: 12px; }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 247, 230, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .login-overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1200px 600px at 10% -10%, #ffe6b3, transparent 60%),
        radial-gradient(1000px 600px at 100% 0%, #c8fff4, transparent 55%),
        var(--bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }
    .login-overlay.active { display: flex; }
    .login-card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
    }
    .login-card h2 {
      margin: 0;
      font-size: 22px;
    }
    .login-card label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    .login-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 5px solid #ffd8a8;
      border-top-color: #ff6b35;
      animation: spin 0.9s linear infinite;
      box-shadow: var(--shadow);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      header { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      th:nth-child(2), td:nth-child(2),
      th:nth-child(7), td:nth-child(7) { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1 class="title">数据统计与展示</h1>
        <p class="subtitle">数据只在点击刷新时更新</p>
      </div>
      <div class="actions">
        <button id="refreshBtn">刷新数据</button>
        <button id="clearBtn" class="secondary">清空缓存</button>
        <button id="settingsBtn" class="ghost">设置接口</button>
        <span class="pill" id="cacheState">缓存：未加载</span>
      </div>
    </header>

    <section class="grid" id="summaryCards"></section>
    <section class="trend-wrap">
      <div class="trend-header">
        <div>
          <h2>小时趋势</h2>
          <p class="subtitle">展示 requests 与 total tokens 的最近小时走势</p>
        </div>
        <div class="segmented" id="trendRange">
          <button type="button" data-hours="24" class="active">24h</button>
          <button type="button" data-hours="72">72h</button>
          <button type="button" data-hours="168">7d</button>
        </div>
      </div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-meta">
            <h3>Requests / Hour</h3>
            <span class="muted" id="requestsChartMeta">--</span>
          </div>
          <svg id="requestsChart" class="chart-svg" viewBox="0 0 560 220" preserveAspectRatio="none"></svg>
        </div>
        <div class="chart-card">
          <div class="chart-meta">
            <h3>Tokens / Hour</h3>
            <span class="muted" id="tokensChartMeta">--</span>
          </div>
          <svg id="tokensChart" class="chart-svg" viewBox="0 0 560 220" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </section>
    <section id="placeholder" class="placeholder" aria-hidden="true">
      <div class="placeholder-row">
        <div class="skeleton big"></div>
        <div class="skeleton big"></div>
        <div class="skeleton big"></div>
        <div class="skeleton big"></div>
      </div>
      <div class="placeholder-row">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
      <div class="placeholder-row">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

    <div class="table-wrap">
      <div class="table-toolbar">
        <div class="toolbar-left">
          <label class="muted">每页</label>
          <select id="pageSize">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
          <span class="muted" id="rowsInfo">0 条记录</span>
        </div>
        <div class="toolbar-right">
          <select id="statusFilter">
            <option value="all">全部状态</option>
            <option value="active">Active</option>
            <option value="cooldown">Cooldown</option>
            <option value="disabled">Disabled</option>
          </select>
          <input id="searchInput" type="text" placeholder="邮箱搜索" />
          <div class="pagination">
            <button id="prevBtn">上一页</button>
            <span id="pageInfo" class="muted">1 / 1</span>
            <button id="nextBtn">下一页</button>
          </div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>邮箱</th>
            <th><button type="button" class="sort-btn" data-sort-key="status">状态 <span class="sort-indicator" data-indicator-for="status">-</span></button></th>
            <th>套餐</th>
            <th><button type="button" class="sort-btn" data-sort-key="successful_requests">成功请求 <span class="sort-indicator" data-indicator-for="successful_requests">-</span></button></th>
            <th>最终失败</th>
            <th><button type="button" class="sort-btn" data-sort-key="last_used_ms">最后使用 <span class="sort-indicator" data-indicator-for="last_used_ms">-</span></button></th>
            <th>Token 过期</th>
            <th>额度</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="footer">
      <span id="updatedAt">上次更新：--</span>
      <span id="cacheNote" class="muted"></span>
    </div>

    <div class="loading-overlay" id="loadingOverlay" aria-live="polite" aria-busy="true">
      <div class="spinner" aria-label="加载中"></div>
    </div>
    <div class="login-overlay" id="loginOverlay" aria-live="polite" aria-busy="true">
      <div class="login-card">
        <h2>连接数据接口</h2>
        <div>
          <label for="apiInput">API 地址</label>
          <input id="apiInput" type="text" placeholder="http://127.0.0.1/stats" />
        </div>
        <div>
          <label for="tokenInput">Bearer Token</label>
          <input id="tokenInput" type="text" placeholder="输入访问 Token" />
        </div>
        <div class="login-actions">
          <button id="saveCredentialsBtn">保存并加载</button>
          <button id="cancelCredentialsBtn" class="ghost">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CACHE_KEY = "stats_cache_v1";
    const CRED_KEY = "stats_credentials_v1";
    const HOUR_MS = 60 * 60 * 1000;

    const els = {
      summaryCards: document.getElementById("summaryCards"),
      tableBody: document.getElementById("tableBody"),
      pageSize: document.getElementById("pageSize"),
      pageInfo: document.getElementById("pageInfo"),
      rowsInfo: document.getElementById("rowsInfo"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      clearBtn: document.getElementById("clearBtn"),
      updatedAt: document.getElementById("updatedAt"),
      cacheState: document.getElementById("cacheState"),
      cacheNote: document.getElementById("cacheNote"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      placeholder: document.getElementById("placeholder"),
      loadingOverlay: document.getElementById("loadingOverlay"),
      loginOverlay: document.getElementById("loginOverlay"),
      apiInput: document.getElementById("apiInput"),
      tokenInput: document.getElementById("tokenInput"),
      saveCredentialsBtn: document.getElementById("saveCredentialsBtn"),
      cancelCredentialsBtn: document.getElementById("cancelCredentialsBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      requestsChart: document.getElementById("requestsChart"),
      tokensChart: document.getElementById("tokensChart"),
      requestsChartMeta: document.getElementById("requestsChartMeta"),
      tokensChartMeta: document.getElementById("tokensChartMeta"),
      trendRangeButtons: Array.from(document.querySelectorAll("#trendRange button")),
      sortButtons: Array.from(document.querySelectorAll(".sort-btn")),
      sortIndicators: Array.from(document.querySelectorAll("[data-indicator-for]"))
    };

    let cache = null;
    let filteredAccounts = [];
    let currentPage = 1;
    let pageSize = Number(els.pageSize.value);
    let memoryOnlyCache = false;
    let credentials = null;
    let chartRangeHours = 24;
    let sortState = { key: "successful_requests", dir: "desc" };

    function formatNumber(n) {
      return new Intl.NumberFormat("zh-CN").format(n ?? 0);
    }

    function formatCompactNumber(n) {
      const value = Number(n ?? 0);
      if (value >= 100000000) return `${(value / 100000000).toFixed(1)}亿`;
      if (value >= 10000) return `${(value / 10000).toFixed(1)}万`;
      return formatNumber(value);
    }

    function formatDate(value) {
      if (!value || String(value).startsWith("0001")) return "--";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "--";
      return d.toLocaleString("zh-CN");
    }

    function formatHour(ms) {
      const d = new Date(ms);
      if (Number.isNaN(d.getTime())) return "--";
      return `${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:00`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function alignHour(ms) {
      return Math.floor(ms / HOUR_MS) * HOUR_MS;
    }

    function statusRank(status) {
      return { active: 0, cooldown: 1, disabled: 2 }[String(status || "").toLowerCase()] ?? 9;
    }

    function setCache(data, meta) {
      cache = { data, meta };
      memoryOnlyCache = false;
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
      } catch (err) {
        memoryOnlyCache = true;
      }
      updateCacheBadge();
    }

    function getCache() {
      if (cache) return cache;
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      try {
        cache = JSON.parse(raw);
        return cache;
      } catch (err) {
        return null;
      }
    }

    function clearCache() {
      cache = null;
      memoryOnlyCache = false;
      localStorage.removeItem(CACHE_KEY);
      updateCacheBadge();
    }

    function updateCacheBadge() {
      if (!cache) {
        els.cacheState.textContent = "缓存：未加载";
        els.cacheNote.textContent = "";
        els.updatedAt.textContent = "上次更新：--";
        return;
      }
      const cachedAt = cache.meta?.cachedAt || "--";
      els.cacheState.textContent = memoryOnlyCache ? "缓存：内存" : "缓存：本地";
      els.cacheNote.textContent = "";
      els.updatedAt.textContent = `上次更新：${cachedAt}`;
    }

    function getCredentials() {
      if (credentials) return credentials;
      const raw = localStorage.getItem(CRED_KEY);
      if (!raw) return null;
      try {
        credentials = JSON.parse(raw);
        return credentials;
      } catch (err) {
        return null;
      }
    }

    function saveCredentials(apiUrl, token) {
      credentials = { apiUrl, token };
      localStorage.setItem(CRED_KEY, JSON.stringify(credentials));
    }

    function getDefaultApiUrl() {
      const origin = window.location.origin || "";
      if (origin && origin !== "null") return `${origin}/stats`;
      return "http://127.0.0.1/stats";
    }

    function showLogin(show) {
      els.loginOverlay.classList.toggle("active", show);
      if (show) {
        const existing = getCredentials();
        const fallbackUrl = getDefaultApiUrl();
        els.apiInput.value = existing?.apiUrl || fallbackUrl;
        els.apiInput.placeholder = fallbackUrl;
        els.tokenInput.value = existing?.token || "";
      }
    }

    function renderSummary(summary, accounts) {
      const safe = summary || {};
      const cards = [
        { label: "总账号", value: safe.total ?? accounts.length },
        { label: "活跃", value: safe.active ?? 0 },
        { label: "冷却中", value: safe.cooldown ?? 0 },
        { label: "禁用", value: safe.disabled ?? 0 }
      ];
      els.summaryCards.innerHTML = cards.map(card => `
        <div class="card">
          <h3>${card.label}</h3>
          <div class="value">${card.raw ? card.value : formatNumber(card.value)}</div>
        </div>
      `).join("");
    }

    function buildContinuousTrend(points, hours) {
      const normalized = new Map();
      for (const point of points || []) {
        const hour = alignHour(Number(point?.hour_start_ms || 0));
        if (!hour) continue;
        normalized.set(hour, {
          hour_start_ms: hour,
          hour_label: point.hour_label || formatHour(hour),
          requests: Number(point.requests || 0),
          input_tokens: Number(point.input_tokens || 0),
          output_tokens: Number(point.output_tokens || 0),
          total_tokens: Number(point.total_tokens || 0)
        });
      }
      const latestPoint = Math.max(Date.now(), ...Array.from(normalized.keys(), value => Number(value)));
      const end = alignHour(latestPoint);
      const start = end - (hours - 1) * HOUR_MS;
      const out = [];
      for (let ts = start; ts <= end; ts += HOUR_MS) {
        out.push(normalized.get(ts) || {
          hour_start_ms: ts,
          hour_label: formatHour(ts),
          requests: 0,
          input_tokens: 0,
          output_tokens: 0,
          total_tokens: 0
        });
      }
      return out;
    }

    function renderLineChart(svgEl, metaEl, series, valueKey, color) {
      const width = 560;
      const height = 220;
      const padLeft = 42;
      const padRight = 12;
      const padTop = 12;
      const padBottom = 28;
      const plotWidth = width - padLeft - padRight;
      const plotHeight = height - padTop - padBottom;
      const values = series.map(item => Number(item[valueKey] || 0));
      const maxValue = Math.max(1, ...values);
      const total = values.reduce((sum, value) => sum + value, 0);
      const peak = Math.max(...values, 0);

      metaEl.textContent = `合计 ${formatCompactNumber(total)} · 峰值 ${formatCompactNumber(peak)}`;

      const points = series.map((item, index) => {
        const x = padLeft + (series.length === 1 ? plotWidth / 2 : index * (plotWidth / (series.length - 1)));
        const y = padTop + plotHeight - (Number(item[valueKey] || 0) / maxValue) * plotHeight;
        return { x, y, label: item.hour_label || formatHour(item.hour_start_ms) };
      });

      const linePath = points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const areaPath = `M ${padLeft} ${padTop + plotHeight} ${points.map(point => `L ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ")} L ${padLeft + plotWidth} ${padTop + plotHeight} Z`;

      const yTicks = [1, 0.5, 0];
      const yGrid = yTicks.map(tick => {
        const y = padTop + plotHeight - tick * plotHeight;
        const label = formatCompactNumber(Math.round(maxValue * tick));
        return `
          <line x1="${padLeft}" y1="${y}" x2="${padLeft + plotWidth}" y2="${y}" stroke="#eadfcb" stroke-dasharray="3 4"></line>
          <text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" class="axis-text">${label}</text>
        `;
      }).join("");

      const xTickIndexes = Array.from(new Set([
        0,
        Math.floor((series.length - 1) / 3),
        Math.floor(((series.length - 1) * 2) / 3),
        Math.max(series.length - 1, 0)
      ])).filter(index => index >= 0 && index < series.length);

      const xTicks = xTickIndexes.map(index => {
        const point = points[index];
        return `<text x="${point.x}" y="${height - 6}" text-anchor="middle" class="axis-text">${escapeHtml(point.label)}</text>`;
      }).join("");

      svgEl.innerHTML = `
        <rect x="0" y="0" width="${width}" height="${height}" rx="12" fill="#fff"></rect>
        ${yGrid}
        <path d="${areaPath}" fill="${color}" opacity="0.14"></path>
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
        ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="2.5" fill="${color}"></circle>`).join("")}
        ${xTicks}
      `;
    }

    function renderTrend(trend) {
      const series = buildContinuousTrend(trend?.hourly || [], chartRangeHours);
      renderLineChart(els.requestsChart, els.requestsChartMeta, series, "requests", "#1b9aaa");
      renderLineChart(els.tokensChart, els.tokensChartMeta, series, "total_tokens", "#ff6b35");
    }

    function rowSortValue(row, key) {
      if (key === "status") return statusRank(row.status);
      if (key === "successful_requests") return Number(row.successful_requests || 0);
      if (key === "last_used_ms") return Number(row.last_used_ms || 0);
      return row[key] ?? "";
    }

    function compareValues(left, right) {
      if (typeof left === "number" && typeof right === "number") return left - right;
      return String(left).localeCompare(String(right), "zh-CN", { numeric: true, sensitivity: "base" });
    }

    function updateSortIndicators() {
      for (const indicator of els.sortIndicators) {
        const key = indicator.dataset.indicatorFor;
        indicator.textContent = key === sortState.key ? (sortState.dir === "asc" ? "▲" : "▼") : "-";
      }
    }

    function applyTableState() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      const accounts = cache?.data?.accounts || [];
      const filtered = accounts
        .filter(account => {
          if (status !== "all" && String(account.status || "").toLowerCase() !== status) return false;
          if (!keyword) return true;
          return String(account.email || "").toLowerCase().includes(keyword) || String(account.file_path || "").toLowerCase().includes(keyword);
        })
        .map((account, index) => ({ account, index }))
        .sort((left, right) => {
          const primary = compareValues(
            rowSortValue(left.account, sortState.key),
            rowSortValue(right.account, sortState.key)
          );
          if (primary !== 0) return sortState.dir === "asc" ? primary : -primary;
          return left.index - right.index;
        })
        .map(item => item.account);

      filteredAccounts = filtered;
      currentPage = 1;
      updateSortIndicators();
      renderTablePage();
    }

    function renderTablePage() {
      const total = filteredAccounts.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      currentPage = Math.min(currentPage, totalPages);
      const start = total === 0 ? 0 : (currentPage - 1) * pageSize;
      const end = total === 0 ? 0 : Math.min(start + pageSize, total);
      const pageRows = filteredAccounts.slice(start, end);

      const fragment = document.createDocumentFragment();
      for (const row of pageRows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(row.email || "--")}</td>
          <td><span class="status ${escapeHtml(row.status || "disabled")}">${escapeHtml(row.status || "--")}</span></td>
          <td>${escapeHtml(row.plan_type || "--")}</td>
          <td>${formatNumber(row.successful_requests)}</td>
          <td>${formatNumber(row.failed_requests)}</td>
          <td>${formatDate(row.last_used_at)}</td>
          <td>${formatDate(row.token_expire)}</td>
          <td>${row.quota_exhausted ? "已用尽" : "可用"}</td>
        `;
        fragment.appendChild(tr);
      }
      els.tableBody.innerHTML = "";
      els.tableBody.appendChild(fragment);

      els.pageInfo.textContent = `${currentPage} / ${totalPages}`;
      if (total === 0) {
        els.rowsInfo.textContent = "0 条记录";
      } else {
        els.rowsInfo.textContent = `${formatNumber(total)} 条记录，当前显示 ${formatNumber(start + 1)}-${formatNumber(end)}`;
      }
      els.prevBtn.disabled = currentPage === 1;
      els.nextBtn.disabled = currentPage === totalPages || total === 0;
    }

    function setLoading(isLoading) {
      els.loadingOverlay.classList.toggle("active", isLoading);
    }

    function clearCharts() {
      els.requestsChart.innerHTML = `<text x="280" y="110" text-anchor="middle" class="empty-text">暂无数据</text>`;
      els.tokensChart.innerHTML = `<text x="280" y="110" text-anchor="middle" class="empty-text">暂无数据</text>`;
      els.requestsChartMeta.textContent = "--";
      els.tokensChartMeta.textContent = "--";
    }

    function showPlaceholder(show) {
      els.placeholder.style.display = show ? "grid" : "none";
      if (show) {
        els.summaryCards.innerHTML = "";
        els.tableBody.innerHTML = "";
        els.rowsInfo.textContent = "0 条记录";
        els.pageInfo.textContent = "1 / 1";
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        clearCharts();
      }
    }

    async function fetchStats() {
      els.cacheState.textContent = "缓存：加载中...";
      setLoading(true);
      try {
        const cred = getCredentials();
        if (!cred?.apiUrl) {
          showLogin(true);
          return;
        }
        const headers = {};
        if (cred.token) headers.Authorization = `Bearer ${cred.token}`;
        const res = await fetch(cred.apiUrl, { method: "GET", headers });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const cachedAt = new Date().toLocaleString("zh-CN");
        setCache(data, { cachedAt });
        render(data);
      } catch (err) {
        if (!cache) showPlaceholder(true);
      } finally {
        setLoading(false);
      }
    }

    function render(data) {
      renderSummary(data.summary, data.accounts || []);
      renderTrend(data.trend || { hourly: [] });
      applyTableState();
      showPlaceholder(false);
      updateCacheBadge();
    }

    function init() {
      clearCharts();
      updateSortIndicators();
      const existing = getCache();
      if (existing?.data) {
        render(existing.data);
        showPlaceholder(false);
      } else {
        showPlaceholder(true);
        fetchStats();
      }
      updateCacheBadge();
    }

    els.pageSize.addEventListener("change", () => {
      pageSize = Number(els.pageSize.value);
      currentPage = 1;
      renderTablePage();
    });
    els.prevBtn.addEventListener("click", () => {
      currentPage = Math.max(1, currentPage - 1);
      renderTablePage();
    });
    els.nextBtn.addEventListener("click", () => {
      currentPage += 1;
      renderTablePage();
    });
    els.refreshBtn.addEventListener("click", () => {
      clearCache();
      showPlaceholder(true);
      fetchStats();
    });
    els.clearBtn.addEventListener("click", () => {
      clearCache();
      showPlaceholder(true);
    });
    els.settingsBtn.addEventListener("click", () => {
      showLogin(true);
    });
    els.saveCredentialsBtn.addEventListener("click", () => {
      const apiUrl = els.apiInput.value.trim();
      const token = els.tokenInput.value.trim();
      if (!apiUrl) return;
      saveCredentials(apiUrl, token);
      showLogin(false);
      clearCache();
      showPlaceholder(true);
      fetchStats();
    });
    els.cancelCredentialsBtn.addEventListener("click", () => {
      showLogin(false);
    });
    els.searchInput.addEventListener("input", applyTableState);
    els.statusFilter.addEventListener("change", applyTableState);
    els.sortButtons.forEach(button => {
      button.addEventListener("click", () => {
        const key = button.dataset.sortKey;
        if (!key) return;
        if (sortState.key === key) {
          sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
        } else {
          sortState.key = key;
          sortState.dir = key === "status" ? "asc" : "desc";
        }
        applyTableState();
      });
    });
    els.trendRangeButtons.forEach(button => {
      button.addEventListener("click", () => {
        chartRangeHours = Number(button.dataset.hours || 24);
        els.trendRangeButtons.forEach(item => item.classList.toggle("active", item === button));
        renderTrend(cache?.data?.trend || { hourly: [] });
      });
    });

    init();
  </script>
</body>
</html>
