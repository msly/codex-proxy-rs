name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact_name: linux-x86_64
            asset_name: codex-proxy-rs-linux-x86_64
            binary_path: target/release/codex-proxy-rs
          - runner: windows-latest
            artifact_name: windows-x86_64
            asset_name: codex-proxy-rs-windows-x86_64.exe
            binary_path: target/release/codex-proxy-rs.exe
          - runner: macos-15-intel
            artifact_name: darwin-x86_64
            asset_name: codex-proxy-rs-darwin-x86_64
            binary_path: target/release/codex-proxy-rs
          - runner: macos-15
            artifact_name: darwin-arm64
            asset_name: codex-proxy-rs-darwin-arm64
            binary_path: target/release/codex-proxy-rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "dist/${{ matrix.asset_name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  publish-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(codex-proxy-rs-*)
          [ ${#files[@]} -gt 0 ] || { ls -la; exit 1; }
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/codex-proxy-rs-*
            dist/SHA256SUMS
            config.example.yaml
